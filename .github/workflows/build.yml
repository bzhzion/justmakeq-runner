name: Build and push runner image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'  # Rebuild hebdomadaire (lundi 3h) pour mises a jour securite
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bzhzion/justmakeq-runner:latest
            ghcr.io/bzhzion/justmakeq-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
